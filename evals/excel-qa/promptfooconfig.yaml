# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: Excel 表格问数评测

providers:
  - id: 'anthropic:messages:{{env.MODEL}}'
    label: '{{env.MODEL}}'
    config:
      apiKey: '{{env.ANTHROPIC_API_KEY}}'
      apiBaseUrl: '{{env.ANTHROPIC_BASE_URL}}'

prompts:
  - id: file://../../prompts/excel-qa.md
    label: excel-qa

tests: ../../tests/excel-qa/cases.yaml

defaultTest:
  options:
    provider:
      id: 'anthropic:messages:{{env.MODEL}}'
      config:
        apiKey: '{{env.ANTHROPIC_API_KEY}}'
        apiBaseUrl: '{{env.ANTHROPIC_BASE_URL}}'

evaluateOptions:
  maxConcurrency: 2

outputPath: ../../results/excel-qa.json
