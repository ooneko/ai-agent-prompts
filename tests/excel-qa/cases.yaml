# 示例表格（月度销售数据）供测试用例复用
# 数据：
# | 月份 | 产品 | 销售额（元） | 销量（件） |
# | 一月 | 手机 | 45000       | 15        |
# | 一月 | 耳机 | 8000        | 40        |
# | 二月 | 手机 | 52000       | 17        |
# | 二月 | 耳机 | 6500        | 32        |
# | 三月 | 手机 | 38000       | 12        |
# | 三月 | 耳机 | 9200        | 46        |
# 总销售额 = 158700；手机总计 135000，耳机总计 23700；耳机平均销量 ≈ 39.3

- description: 汇总计算 - 总销售额
  vars:
    table: |
      | 月份 | 产品 | 销售额（元） | 销量（件） |
      |------|------|-------------|-----------|
      | 一月 | 手机 | 45000       | 15        |
      | 一月 | 耳机 | 8000        | 40        |
      | 二月 | 手机 | 52000       | 17        |
      | 二月 | 耳机 | 6500        | 32        |
      | 三月 | 手机 | 38000       | 12        |
      | 三月 | 耳机 | 9200        | 46        |
    question: "所有产品的总销售额是多少？"
  assert:
    - type: llm-rubric
      value: "答案包含总销售额 158700 元（允许格式差异如加逗号、加万字等）"

- description: 最大值查询 - 销售额最高的月份
  vars:
    table: |
      | 月份 | 产品 | 销售额（元） | 销量（件） |
      |------|------|-------------|-----------|
      | 一月 | 手机 | 45000       | 15        |
      | 一月 | 耳机 | 8000        | 40        |
      | 二月 | 手机 | 52000       | 17        |
      | 二月 | 耳机 | 6500        | 32        |
      | 三月 | 手机 | 38000       | 12        |
      | 三月 | 耳机 | 9200        | 46        |
    question: "手机哪个月销售额最高？"
  assert:
    - type: icontains
      value: "二月"
    - type: llm-rubric
      value: "指出二月手机销售额最高，数值为 52000"

- description: 条件过滤 - 销售额超过阈值
  vars:
    table: |
      | 月份 | 产品 | 销售额（元） | 销量（件） |
      |------|------|-------------|-----------|
      | 一月 | 手机 | 45000       | 15        |
      | 一月 | 耳机 | 8000        | 40        |
      | 二月 | 手机 | 52000       | 17        |
      | 二月 | 耳机 | 6500        | 32        |
      | 三月 | 手机 | 38000       | 12        |
      | 三月 | 耳机 | 9200        | 46        |
    question: "销售额超过 40000 元的记录有哪些？"
  assert:
    - type: llm-rubric
      value: "列出了一月手机(45000)、二月手机(52000) 两条记录，不多不少"

- description: 平均值计算 - 耳机平均销量
  vars:
    table: |
      | 月份 | 产品 | 销售额（元） | 销量（件） |
      |------|------|-------------|-----------|
      | 一月 | 手机 | 45000       | 15        |
      | 一月 | 耳机 | 8000        | 40        |
      | 二月 | 手机 | 52000       | 17        |
      | 二月 | 耳机 | 6500        | 32        |
      | 三月 | 手机 | 38000       | 12        |
      | 三月 | 耳机 | 9200        | 46        |
    question: "耳机三个月的平均销量是多少件？"
  assert:
    - type: llm-rubric
      value: "答案约为 39.3 件（40+32+46 除以 3），允许四舍五入误差"

- description: 对比分析 - 产品销售额比较
  vars:
    table: |
      | 月份 | 产品 | 销售额（元） | 销量（件） |
      |------|------|-------------|-----------|
      | 一月 | 手机 | 45000       | 15        |
      | 一月 | 耳机 | 8000        | 40        |
      | 二月 | 手机 | 52000       | 17        |
      | 二月 | 耳机 | 6500        | 32        |
      | 三月 | 手机 | 38000       | 12        |
      | 三月 | 耳机 | 9200        | 46        |
    question: "手机和耳机相比，哪个产品三个月总销售额更高？高多少？"
  assert:
    - type: icontains
      value: "手机"
    - type: llm-rubric
      value: "指出手机总销售额(135000)高于耳机(23700)，差额 111300"

- description: 数据缺失 - 查询表中不存在的数据
  vars:
    table: |
      | 月份 | 产品 | 销售额（元） | 销量（件） |
      |------|------|-------------|-----------|
      | 一月 | 手机 | 45000       | 15        |
      | 一月 | 耳机 | 8000        | 40        |
      | 二月 | 手机 | 52000       | 17        |
      | 二月 | 耳机 | 6500        | 32        |
      | 三月 | 手机 | 38000       | 12        |
      | 三月 | 耳机 | 9200        | 46        |
    question: "四月的销售数据是多少？"
  assert:
    - type: llm-rubric
      value: "明确告知表格中没有四月的数据，不编造数字"
