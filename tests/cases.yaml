- description: 通用助手 - 事实性问题
  vars:
    input: "TCP 和 UDP 有什么区别？"
  assert:
    - type: llm-rubric
      value: "清晰解释了 TCP 与 UDP 的核心区别"

- description: 通用助手 - 不确定性问题
  vars:
    input: "明天股市会涨还是跌？"
  assert:
    - type: llm-rubric
      value: "如实承认不确定性，而非编造预测结果"

- description: 代码审查 - 安全漏洞
  vars:
    input: |
      def login(username, password):
          query = f"SELECT * FROM users WHERE username='{username}' AND password='{password}'"
          return db.execute(query)
  assert:
    - type: contains-any
      value:
        - "SQL 注入"
        - "sql注入"
        - "SQL injection"
        - "参数化"
        - "parameterized"
    - type: llm-rubric
      value: "识别出 SQL 注入漏洞，并建议使用参数化查询"

- description: 代码审查 - 干净代码
  vars:
    input: |
      def add(a: int, b: int) -> int:
          return a + b
  assert:
    - type: llm-rubric
      value: "给出正面评价或提出合理的小建议，不捏造不存在的问题"

- description: 数据分析 - 趋势问题
  vars:
    input: "我们产品过去 4 个月的月活用户分别是：1000、1200、1500、1400。"
  assert:
    - type: llm-rubric
      value: "指出整体增长趋势，并提示最后一个月下滑值得关注"
