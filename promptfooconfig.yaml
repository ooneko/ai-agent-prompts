description: AI Agent Prompts Evaluation

# Providers to test against
providers:
  - id: openai:gpt-4o-mini
    label: gpt-4o-mini
  - id: anthropic:claude-haiku-4-5-20251001
    label: claude-haiku

# Prompt files to evaluate
prompts:
  - id: file://prompts/assistant.md
    label: assistant
  - id: file://prompts/code-reviewer.md
    label: code-reviewer
  - id: file://prompts/data-analyst.md
    label: data-analyst

# Test cases
tests: tests/cases.yaml

# Default assertion threshold (60% pass rate)
defaultTest:
  options:
    provider: openai:gpt-4o-mini

# Output settings
outputPath: results/latest.json
