# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: AI Agent Prompts Evaluation

# Providers to test against
providers:
  - id: anthropic:messages:GLM-5.1
    label: glm-4-flash
    config:
      apiKey: '{{env.ANTHROPIC_API_KEY}}'
      apiBaseUrl: https://open.bigmodel.cn/api/anthropic

# Prompt files to evaluate
prompts:
  - id: file://prompts/assistant.md
    label: assistant
  - id: file://prompts/code-reviewer.md
    label: code-reviewer
  - id: file://prompts/data-analyst.md
    label: data-analyst

# Test cases
tests: tests/cases.yaml

# llm-rubric assertions graded by the same provider
defaultTest:
  options:
    provider:
      id: anthropic:messages:GLM-5.1
      config:
        apiKey: '{{env.ANTHROPIC_API_KEY}}'
        apiBaseUrl: https://open.bigmodel.cn/api/anthropic

# Avoid rate limit (BigModel free tier)
evaluateOptions:
  maxConcurrency: 2

# Output settings
outputPath: results/latest.json
