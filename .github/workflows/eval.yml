name: Prompt Eval

on:
  workflow_dispatch:   # 手动触发
  push:
    branches: [main]
    paths:
      - 'prompts/**'
      - 'tests/**'
      - 'evals/**'
      - 'Makefile'
  pull_request:
    paths:
      - 'prompts/**'
      - 'tests/**'
      - 'evals/**'
      - 'Makefile'

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install promptfoo
        run: npm install -g promptfoo

      - name: Run agent evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          MODEL: ${{ secrets.MODEL }}
        run: promptfoo eval -c evals/general/promptfooconfig.yaml --no-cache --output results/general.json

      - name: Run excel-qa evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          MODEL: ${{ secrets.MODEL }}
        run: promptfoo eval -c evals/excel-qa/promptfooconfig.yaml --no-cache --output results/excel-qa.json

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: results/
